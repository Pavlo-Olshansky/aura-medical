# Production Docker Compose — Aura Medical Tracker
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Requires: .env.prod (copy from .env.prod.example)

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend (multi-worker uvicorn, no --reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    volumes:
      - documents:/app/documents
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Vue.js SPA served by Nginx (multi-stage build, no Node.js runtime)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  # Edge reverse proxy — SSL termination, gzip, routing
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/privkey.pem:ro
      - documents:/documents:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Automated PostgreSQL backups (cron + optional S3 upload + Telegram alerts)
  backup:
    build: ./backup
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_KEEP_LOCAL: ${BACKUP_KEEP_LOCAL:-30}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-medtracker}
      BACKUP_KEEP_REMOTE: ${BACKUP_KEEP_REMOTE:-30}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKUP_NOTIFY_TELEGRAM_TOKEN: ${BACKUP_NOTIFY_TELEGRAM_TOKEN:-}
      BACKUP_NOTIFY_TELEGRAM_CHAT_ID: ${BACKUP_NOTIFY_TELEGRAM_CHAT_ID:-}
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  documents:
  backups:
